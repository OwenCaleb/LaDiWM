defaults:
  - _self_

experiment: dino_siglip_wm_policy # tag for wandb and log dir

hydra:
  run:
    dir: /media/huang/T7/real_exp/policy/${now:%m%d}_${experiment}_${now:%H%M}_seed${seed}
  sweep:
    dir: /media/huang/T7/real_exp/policy/${now:%m%d}_${experiment}_${now:%H%M}_seed${seed}
    subdir: ${hydra.job.num}

wandb:
  project: atm_policy
  name: ${now:%m%d}_${experiment}_${now:%H%M}_seed${seed}_${hydra:job.num}
  group: ${experiment}

train_gpus: [0]

# Training
lr: 5e-5
batch_size: 16
mix_precision: false
num_workers: 4
val_freq: 5
save_freq: 10
log_interval: 20
clip_grad: 10.
epochs: 101
seed: 0
dry: false

img_size: 128
frame_stack: 4
num_track_ts: 16
num_track_ids: 32
extra_state_keys: ["joint_states", "gripper_states"]
#extra_state_keys: ["ee_states"]

aug_prob: 0.9

train_dataset:
val_dataset:
val_num_demos: null

env_cfg:
  env_type: libero
  render_gpu_ids: 0
  vec_env_num: 10
  horizon: 600
  env_name: []
  task_name: []
  env_meta_fn: []

optimizer_cfg:
  type: optim.AdamW
  params:
    lr: ${lr}
    weight_decay: 1e-4

scheduler_cfg:
  type: CosineAnnealingLR
  params:
    T_max: ${epochs}
    eta_min: 0.
    last_epoch: -1

model_name: BCViLTPolicyDiff_DINO_SIGLIP_WM5
model_cfg:
  load_path:
  sampling_step: 2
  dino_preweight: /media/huang/T7/ori_mount/pre_weight/dinov2_vitb14_pretrain.pth
  obs_cfg:
    obs_shapes:
      rgb:
      - 10
      - 3
      - 128
      - 128
      tracks:
      - 16
      - 32
      - 2
    img_mean:
    - 0.0
    - 0.0
    - 0.0
    img_std:
    - 1.0
    - 1.0
    - 1.0
    num_views: 2
    extra_states: ${extra_state_keys}
    max_seq_len: ${frame_stack}
  img_encoder_cfg:
    network_name: PatchEncoder3D
    patch_size:
    - 2
    - 2
    embed_size: 256
    no_patch_embed_bias: false
  language_encoder_cfg:
    network_name: MLPEncoder
    input_size: 768
    hidden_size: 256
    num_layers: 2
  extra_state_encoder_cfg:
    extra_num_layers: 0
    extra_hidden_size: 256
  track_cfg:
    track_fn:
    policy_track_patch_size: 16
    use_zero_track: false
  spatial_transformer_cfg:
    num_layers: 6
    num_heads: 8
    head_output_size: 128
    mlp_hidden_size: 512
    dropout: 0.1
    spatial_downsample: true
    spatial_downsample_embed_size: 256
    use_language_token: false
  temporal_transformer_cfg:
    num_layers: 4
    num_heads: 8
    head_output_size: 256
    mlp_hidden_size: 512
    dropout: 0.1
    use_language_token: false
  policy_head_cfg:
    network_name: DeterministicHead
    input_frame: 4
    output_size:
    - 7
    - 7
    hidden_size: 1024
    num_layers: 2
    loss_coef: 1.0
    action_squash: false

dataset_cfg:
  img_size: ${img_size}
  his_frame: 4
  pred_frame: 7
  frame_stack: ${frame_stack}
  num_track_ts: ${num_track_ts}
  num_track_ids: ${num_track_ids}
  track_obs_fs: 1
  augment_track: false
  extra_state_keys: ${extra_state_keys}
  cache_all: false
  cache_image: false